<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌍 Dil Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0c10;--card:#13151f;--border:rgba(255,255,255,0.08);--yellow:#FFE135;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--text:#f1f5f9;--muted:rgba(255,255,255,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;}
header h1{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--yellow);}
a.back{border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-size:0.8rem;text-decoration:none;font-weight:600;}
.wrap{max-width:600px;margin:0 auto;padding:24px;}

/* DIL SEÇİCİ */
.setup{text-align:center;}
.setup h2{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--yellow);margin-bottom:8px;}
.setup p{color:var(--muted);font-size:0.88rem;margin-bottom:28px;}
.dil-secici{display:flex;gap:20px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
.dil-grup{flex:1;min-width:200px;}
.dil-grup label{display:block;font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:8px;}
.dil-select{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;cursor:pointer;}
.dil-select:focus{outline:none;border-color:var(--yellow);}
.kategori-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;}
.kat-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.2s;}
.kat-btn.on{border-color:var(--yellow);background:#1a1b10;}
.kat-btn em{font-style:normal;font-size:1.4rem;display:block;margin-bottom:4px;}
.kat-btn span{font-size:0.7rem;font-weight:700;color:var(--muted);}
.kat-btn.on span{color:var(--yellow);}
.basla-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--yellow);color:#111;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.2s;}
.basla-btn:hover{background:#f0d400;}

/* OYUN */
.oyun{display:none;}
.oyun.on{display:block;}
.prog-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:100px;margin-bottom:20px;overflow:hidden;}
.prog-dolu{height:100%;background:var(--yellow);border-radius:100px;transition:width 0.4s ease;}
.ust-bilgi{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:0.82rem;color:var(--muted);}
.ust-bilgi span{font-weight:600;}
.istatlar{display:flex;gap:12px;}
.istat{font-weight:700;}
.istat.d{color:var(--green);}
.istat.y{color:var(--red);}

/* KART */
.kart-alani{perspective:1000px;margin-bottom:20px;cursor:pointer;}
.kart-ic{position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);border-radius:20px;}
.kart-ic.cevrildi{transform:rotateY(180deg);}
.kart-on,.kart-arka{backface-visibility:hidden;border-radius:20px;padding:40px 32px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.kart-on{background:var(--card);border:1.5px solid var(--border);}
.kart-arka{background:#1a1b10;border:1.5px solid rgba(255,225,53,0.3);position:absolute;top:0;left:0;right:0;transform:rotateY(180deg);}
.kart-dil{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:12px;}
.kart-kelime{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.2;}
.kart-on .kart-kelime{color:var(--text);}
.kart-arka .kart-kelime{color:var(--yellow);}
.kart-ipucu{font-size:0.82rem;color:var(--muted);margin-bottom:8px;}
.kart-ornek{font-size:0.85rem;color:var(--muted);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);}
.cevirme-hint{font-size:0.72rem;color:var(--muted);text-align:center;margin-bottom:12px;}

/* CEVAP BUTONLARI */
.cevap-btns{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.btn-biliyorum{flex:1;padding:14px;border-radius:12px;border:none;background:rgba(74,222,128,0.15);color:var(--green);border:1.5px solid rgba(74,222,128,0.3);font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;}
.btn-biliyorum:hover{background:rgba(74,222,128,0.25);}
.btn-bilmiyorum{flex:1;padding:14px;border-radius:12px;border:none;background:rgba(248,113,113,0.15);color:var(--red);border:1.5px solid rgba(248,113,113,0.3);font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;}
.btn-bilmiyorum:hover{background:rgba(248,113,113,0.25);}
.btn-sonraki{width:100%;padding:13px;border-radius:12px;border:none;background:var(--yellow);color:#111;font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;display:none;}
.btn-sonraki:hover{background:#f0d400;}

/* SONUÇ */
.sonuc{display:none;text-align:center;}
.sonuc.on{display:block;}
.sonuc-emoji{font-size:3.5rem;margin-bottom:12px;}
.sonuc-puan{font-family:'Syne',sans-serif;font-size:3.5rem;font-weight:800;color:var(--yellow);}
.sonuc-alt{color:var(--muted);margin-bottom:24px;}
.sonuc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.s-kutu{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.s-sayi{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;}
.s-lbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:4px;}
.tekrar-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--yellow);color:#111;font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;margin-bottom:10px;}
.menu-btn{width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;}

.dil-btn{position:fixed;top:16px;right:80px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:100px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;z-index:1000;transition:all 0.2s;}
.dil-btn:hover{background:rgba(255,255,255,0.14);}
</style>
</head>

<header><h1 id="_txt_baslik">🌍 Dil Flashcard</h1><a href="index.html" class="back">← Ana Sayfa</a></header>

<div class="setup" id="setupDiv">

    </div>
    <div class="dil-grup">
      <label id="_txt_ana">Your native language</label>
      <select class="dil-select" id="anaDil"></select>
    </div>
  </div>

  <div class="kategori-grid" id="kategoriGrid"></div>
  <button class="basla-btn" onclick="oyunuBaslat()" id="_txt_baslat_ignored">🚀 Start</button>
</div>

<!-- OYUN -->
<div class="oyun" id="oyunDiv">
  <div class="prog-bar"><div class="prog-dolu" id="progDolu" style="width:0%"></div></div>
  <div class="ust-bilgi">
    <span id="kartSayac">1/20</span>

  <div class="kart-alani" onclick="kartCevir()">

      <div class="kart-on">

        <div class="kart-kelime" id="arkaKelime"></div>
        <div class="kart-ornek" id="arkaOrnek"></div>
      </div>
    </div>
  </div>
  <div class="cevap-btns" id="cevapBtns" style="display:none;">
    <button class="btn-bilmiyorum" onclick="cevapVer(false)" id="_txt_bilmiyorum_ignored">✗ I don't know</button>
    <button class="btn-biliyorum" onclick="cevapVer(true)" id="_txt_biliyorum_ignored">✓ I know it</button>
  </div>
  <button class="btn-sonraki" id="sonrakiBtn" onclick="sonraki()" id="_txt_sonraki_ignored">Next →</button>
</div>

<!-- SONUÇ -->
<div class="sonuc" id="sonucDiv">
  <div class="sonuc-emoji" id="sonucEmoji"></div>
  <div class="sonuc-puan" id="sonucPuan"></div>
  <div class="sonuc-alt" id="sonucAlt"></div>
  <div class="sonuc-grid">
    <div class="s-kutu"><div class="s-sayi" style="color:var(--green)" id="sDogru"></div><div class="s-lbl">Biliyor</div></div>
    <div class="s-kutu"><div class="s-sayi" style="color:var(--red)" id="sYanlis"></div><div class="s-lbl">Bilmiyor</div></div>
    <div class="s-kutu"><div class="s-sayi" style="color:var(--yellow)" id="sOran"></div><div class="s-lbl">Başarı</div></div>
  </div>
  <button class="tekrar-btn" onclick="tekrar()">🔁 Tekrar</button>
  <button class="menu-btn" onclick="menuye()">← Menüye Dön</button>
</div>

</div>

var seciliKategori = 'temel';
var hedefKod, anaKod;
var kartlar, kartIdx, dogru, yanlis, cevrildi;

// Dil seçicileri doldur
var hedefEl = document.getElementById('hedefDil');
var anaEl = document.getElementById('anaDil');
DILLER.forEach(function(d){
  hedefEl.innerHTML += '<option value="'+d.kod+'">'+d.bayrak+' '+d.ad+'</option>';
  anaEl.innerHTML += '<option value="'+d.kod+'">'+d.bayrak+' '+d.ad+'</option>';
});
hedefEl.value = 'en';
anaEl.value = 'tr';

// Kategori butonları
var katGrid = document.getElementById('kategoriGrid');
KATEGORILER.forEach(function(k){
  var btn = document.createElement('div');
  btn.className = 'kat-btn' + (k.id===seciliKategori?' on':'');
  btn.innerHTML = '<em>'+k.em+'</em><span>'+k.ad+'</span>';
  btn.addEventListener('click', function(){
    document.querySelectorAll('.kat-btn').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    seciliKategori = k.id;
  });
  katGrid.appendChild(btn);
});

function oyunuBaslat(){
  hedefKod = hedefEl.value;
  anaKod = anaEl.value;
  if(hedefKod === anaKod){ alert('İki farklı dil seç!'); return; }
  var pool = KELIMELER[seciliKategori] || KELIMELER.temel;
  kartlar = pool.slice().sort(function(){return Math.random()-0.5;});
  kartIdx=0; dogru=0; yanlis=0; cevrildi=false;
  document.getElementById('setupDiv').style.display='none';
  document.getElementById('sonucDiv').classList.remove('on');
  document.getElementById('oyunDiv').classList.add('on');
  document.getElementById('dogruSay').textContent=0;
  document.getElementById('yanlisSay').textContent=0;
  kartGoster();
}

function dilAdi(kod){
  var d = DILLER.find(function(x){return x.kod===kod;});
  return d ? d.bayrak+' '+d.ad : kod;
}

function kartGoster(){
  if(kartIdx >= kartlar.length){ oyunBitti(); return; }
  var k = kartlar[kartIdx];
  document.getElementById('progDolu').style.width = (kartIdx/kartlar.length*100)+'%';
  document.getElementById('kartSayac').textContent = (kartIdx+1)+'/'+kartlar.length;
  document.getElementById('onDil').textContent = dilAdi(hedefKod);
  document.getElementById('onKelime').textContent = k[hedefKod] || k['en'] || '—';
  document.getElementById('arkaDil').textContent = dilAdi(anaKod);
  document.getElementById('arkaKelime').textContent = k[anaKod] || k['tr'] || '—';
  document.getElementById('arkaOrnek').textContent = '';
  // Reset kart
  var ic = document.getElementById('kartIc');
  ic.classList.remove('cevrildi');
  cevrildi = false;
  document.getElementById('cevapBtns').style.display='none';
  document.getElementById('sonrakiBtn').style.display='none';
}

function kartCevir(){
  var ic = document.getElementById('kartIc');
  ic.classList.toggle('cevrildi');
  cevrildi = !cevrildi;
  if(cevrildi){
    document.getElementById('cevapBtns').style.display='flex';
  } else {
    document.getElementById('cevapBtns').style.display='none';
  }
}

function cevapVer(bildi){
  if(bildi){ dogru++; document.getElementById('dogruSay').textContent=dogru; }
  else{ yanlis++; document.getElementById('yanlisSay').textContent=yanlis; }
  document.getElementById('cevapBtns').style.display='none';
  document.getElementById('sonrakiBtn').style.display='block';
}

function sonraki(){
  kartIdx++;
  kartGoster();
}

function oyunBitti(){
  var oran = Math.round(dogru/(kartlar.length)*100);
  document.getElementById('oyunDiv').classList.remove('on');
  document.getElementById('sonucDiv').classList.add('on');
  document.getElementById('sonucEmoji').textContent = oran>=80?'🏆':oran>=60?'🎉':'📚';
  document.getElementById('sonucPuan').textContent = oran+'%';
  document.getElementById('sonucAlt').textContent = dogru+'/'+kartlar.length+' kelimeyi bildin!';
  document.getElementById('sDogru').textContent = dogru;
  document.getElementById('sYanlis').textContent = yanlis;
  document.getElementById('sOran').textContent = oran+'%';
}

function tekrar(){ oyunuBaslat(); }
function menuye(){
  document.getElementById('sonucDiv').classList.remove('on');
  document.getElementById('oyunDiv').classList.remove('on');
  document.getElementById('setupDiv').style.display='block';
}

// Klavye
document.addEventListener('keydown', function(e){
  if(e.code==='Space'){ e.preventDefault(); kartCevir(); }
  if(e.key==='ArrowRight'&&document.getElementById('sonrakiBtn').style.display!=='none') sonraki();
  if(e.key==='ArrowUp'&&cevrildi) cevapVer(true);
  if(e.key==='ArrowDown'&&cevrildi) cevapVer(false);
});
</script>
